parameters:
  - name: serviceConnection
    type: string
  - name: resourceGroupName
    type: string
  - name: location
    type: string
  - name: environment
    type: string
  - name: sqlAdminPassword
    type: string
  - name: bicepFile
    type: string
    default: 'infra/bicep/main.bicep'
  - name: parametersFile
    type: string
    default: 'infra/bicep/parameters/dev.bicepparam'

steps:
  - task: AzureResourceManagerTemplateDeployment@3
    displayName: 'Deploy Bicep Infrastructure'
    inputs:
      deploymentScope: 'Resource Group'
      azureResourceManagerConnection: '${{ parameters.serviceConnection }}'
      action: 'Create Or Update Resource Group'
      resourceGroupName: '${{ parameters.resourceGroupName }}'
      location: '${{ parameters.location }}'
      templateLocation: 'Linked artifact'
      csmFile: 'infra/bicep/main.bicep'
      overrideParameters: '-environment ${{ parameters.environment }} -sqlAdminPassword "${{ parameters.sqlAdminPassword }}"'
      deploymentMode: 'Incremental'
