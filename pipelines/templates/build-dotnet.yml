parameters:
  - name: solutionPath
    type: string
    default: '**/*.slnx'
  - name: buildConfiguration
    type: string
    default: 'Release'

steps:
  - task: DotNetCoreCLI@2
    displayName: 'Restore NuGet Packages'
    inputs:
      command: 'restore'
      projects: '${{ parameters.solutionPath }}'

  - task: DotNetCoreCLI@2
    displayName: 'Build Solution'
    inputs:
      command: 'build'
      projects: '${{ parameters.solutionPath }}'
      arguments: '--configuration ${{ parameters.buildConfiguration }} --no-restore'
